# Ruff linter configuration
# https://docs.astral.sh/ruff/configuration/

target-version = "py312"
line-length = 100
exclude = ["Untitled.ipynb"]

[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
]
ignore = [
    "E501",  # line too long — advisory, not blocking
]
