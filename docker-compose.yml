version: "3.8"

services:
  # --- Infrastructure ---

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Application ---

  producer:
    build: .
    command: ["python", "producer_main.py"]
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      API_KEY: "local"
      API_SECRET_KEY: "local"
      BOOTSTRAP_SERVER: "kafka:29092"
      SECURITY_PROTOCOL: "PLAINTEXT"
      SASL_MECHANISM: "PLAIN"
      ENDPOINT_SCHEMA_URL: "http://schema-registry:8081"
      SCHEMA_REGISTRY_API_KEY: "local"
      SCHEMA_REGISTRY_API_SECRET: "local"

  consumer:
    build: .
    command: ["python", "consumer_main.py"]
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      API_KEY: "local"
      API_SECRET_KEY: "local"
      BOOTSTRAP_SERVER: "kafka:29092"
      SECURITY_PROTOCOL: "PLAINTEXT"
      SASL_MECHANISM: "PLAIN"
      ENDPOINT_SCHEMA_URL: "http://schema-registry:8081"
      SCHEMA_REGISTRY_API_KEY: "local"
      SCHEMA_REGISTRY_API_SECRET: "local"
      MONGO_DB_URL: "mongodb://mongodb:27017"
      MONGO_DB_NAME: "sensor_data"
      CONSUMER_GROUP_ID: "sensor-pipeline-group"
      CONSUMER_BATCH_SIZE: "5000"

volumes:
  mongodb_data:
